# This tmux statusbar config was created by tmuxline.vim
# on Wed, 05 May 2021
#
# Layout is shared by every theme — do not edit the per-theme files under
# dot_config/tmux/tmuxline/, they are one-line colour manifests that include
# this template. Edit the layout here, once.
#
# Roles: statusbar_bg (bar background), overlay_bg (raised segments),
#        accent (session/host caps), text (normal fg), text_on_accent,
#        border (inactive pane border — dark themes use overlay_bg, light themes a mid-tone).

set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg={{ .text }},bg={{ .overlay_bg }}"
set -g status-right-style "none"
set -g pane-active-border-style "fg={{ .accent }}"
set -g status-style "none,bg={{ .statusbar_bg }}"
set -g message-style "fg={{ .text }},bg={{ .overlay_bg }}"
set -g pane-border-style "fg={{ .border }}"
set -g pane-border-lines "heavy"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg={{ .accent }},bg={{ .statusbar_bg }}"
setw -g window-status-separator ""
setw -g window-status-style "none,fg={{ .text }},bg={{ .statusbar_bg }}"

# Status Left
set -g status-left "#{prefix_highlight}#[fg={{ .text_on_accent }},bg={{ .accent }}] #S #[fg={{ .accent }},bg={{ .overlay_bg }},nobold,nounderscore,noitalics]#[fg={{ .text }},bg={{ .overlay_bg }}] %R #[fg={{ .overlay_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]#[fg={{ .text }},bg={{ .statusbar_bg }}]  #[fg=blue]#{sysstat_ntemp}  󰇚 #(~/.config/tmux/tmuxline/widget-color.sh)#{download_speed} #(~/.config/tmux/tmuxline/widget-color.sh)󰕒 #{upload_speed} #[fg={{ .statusbar_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]"

# Status Right (Modified: Moved memory display and changed date format)
set -g status-right "#[fg={{ .statusbar_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]#[fg={{ .text }},bg={{ .statusbar_bg }}] #[fg=blue]#{sysstat_itemp} #{sysstat_mem} #{sysstat_cpu} #[fg={{ .overlay_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]#[fg={{ .text }},bg={{ .overlay_bg }}] %Y-%m-%d #[fg={{ .accent }},bg={{ .overlay_bg }},nobold,nounderscore,noitalics]#[fg={{ .text_on_accent }},bg={{ .accent }}] #H #( )"
# Window Status Formats
setw -g window-status-format "#[fg={{ .statusbar_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]#[fg={{ .text }}] #I  #W #{?@agent_badge,#{@agent_badge}#[fg={{ .text }}]#[bg={{ .statusbar_bg }}] ,}#[fg={{ .statusbar_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg={{ .statusbar_bg }},bg={{ .overlay_bg }},nobold,nounderscore,noitalics]#[fg={{ .text }},bg={{ .overlay_bg }}] #I  #W  #F #{?@agent_badge,#{@agent_badge}#[fg={{ .text }}]#[bg={{ .overlay_bg }}] ,}#[fg={{ .overlay_bg }},bg={{ .statusbar_bg }},nobold,nounderscore,noitalics]"
